name: CI

# Placeholder Test check the autopilot gates agent PRs on.
#
# Replace the contents of the `Test` job with your real test command.
# The autopilot scans for a check named `Test` on each agent PR's head SHA
# and dispatches this workflow when one is missing; what runs inside is
# entirely up to the consumer repo.

on:
  push:
    branches:
      - main
      - "agent/issue-*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to test (branch name or SHA)"
        required: false
        type: string

permissions:
  contents: read
  checks: write

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Tests
        run: bun test --coverage
